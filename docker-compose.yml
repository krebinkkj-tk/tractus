services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tractus
      POSTGRES_PASSWORD: tractus_password
      POSTGRES_DB: tractus_e2e
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "ps_isready -U tractus -d tractus_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda
    environment:
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", rpk cluster health]
      interval: 5s
      timeout: 5s
      retries: 5
