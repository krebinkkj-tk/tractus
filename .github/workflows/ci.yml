name: CI / CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-and-unit-tests:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Biome Check (Lint & Format)
        run: yarn check

      - name: Typecheck
        run: yarn ci

      - name: Build Packages
        run: yarn build

      - name: Unit Tests
        run: yarn test

  e2e-tests:
    name: End-to-End Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Packages
        run: yarn build

      - name: Start Docker Infrastructure
        run: docker compose up -d

      - name: Wait for Infrastructure Ready
        run: sleep 15

      - name: Setup Database Schema
        run: |
          yarn workspace @tractus/e2e run db:push
          yarn workspace @tractus/e2e run db:generate

      - name: Run E2E Tests
        run: yarn workspace @tractus/e2e run test:e2e

      - name: Teardown Docker Infrastructure
        if: always()
        run: docker compose down
